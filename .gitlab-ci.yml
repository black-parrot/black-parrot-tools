
variables:
  #########################################
  # BSG Variables
  #########################################
  USER_NAME: "${BSG_CI_USER_NAME}"
  USER_ID: "${BSG_CI_USER_ID}"
  GROUP_NAME: "${BSG_CI_GROUP_NAME}"
  GROUP_ID: "${BSG_CI_GROUP_ID}"
  OTHER_GROUPS: "${BSG_CI_OTHER_GROUPS}"
  CORES_PER_JOB: "${BSG_CI_CORES_PER_JOB}"
  MAX_CORES: "${BSG_CI_MAX_CORES}"
  #########################################
  # GitLab Variables
  #########################################
  # Automatic
  BUILDS: "${CI_BUILDS_DIR}"
  BRANCH: "${CI_COMMIT_REF_SLUG}"
  SHA: "${CI_COMMIT_SHA}"
  REGISTRY: "${CI_REGISTRY}"
  REGISTRY_USER: "${CI_REGISTRY_USER}"
  REGISTRY_IMAGE: "${CI_REGISTRY_IMAGE}"
  REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  HASH: "${CI_COMMIT_SHA}"
  REPO_URL: "${CI_REPOSITORY_URL}"
  REPO_NAME: "${CI_PROJECT_NAME}"
  JOB_NAME: "${CI_JOB_NAME_SLUG}"
  CACHE_KEY: "${REPO_NAME}-${BRANCH}" # Cache per-branch
  # Disable git clone by default
  GIT_STRATEGY: "none"
  GIT_FETCH_EXTRA_FLAGS: "--prune --progress --no-tags"
  GIT_SUBMODULE_STRATEGY: "none"
  GIT_SUBMODULE_UPDATE_FLAGS: "--jobs ${BSG_CI_MAX_CORES} --recommend-shallow"
  GIT_CHECKOUT: "true"
  GIT_CLEAN_FLAGS: "-ffdx"
  GIT_CLONE_PATH: "${BUILDS}/${REPO_NAME}-${SHA}" # Clone per-commit
  # workaround for https://gitlab.com/gitlab-org/gitlab/-/issues/386967
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: "safe.directory"
  GIT_CONFIG_VALUE_0: "*"
  # Performance flags
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fastest"
  CACHE_COMPRESSION_LEVEL: "fastest"

stages:
  - validate
  - docker
  - repo

# Check for variables to make sure this is a sane configuration
undef_job:
  stage: validate
  rules:
    - if: $USER_NAME == null
    - if: $USER_ID == null
    - if: $GROUP_NAME == null
    - if: $GROUP_ID == null
    - if: $OTHER_GROUPS == null
    - if: $CORES_PER_JOB == null
    - if: $MAX_CORES == null
    - if: $BUILDS == null
    - if: $BRANCH == null
    - if: $SHA == null
    - if: $REGISTRY == null
    - if: $REGISTRY_USER == null
    - if: $REGISTRY_IMAGE == null
    - if: $REGISTRY_PASSWORD == null
    - if: $HASH == null
    - if: $REPO_URL == null
    - if: $REPO_NAME == null
    - if: $JOB_NAME == null
    - if: $CACHE_KEY == null
  script:
      - echo "[CI] Variable is not defined"
      - exit 1

###################################################
## Base Job Template
###################################################
.job_template:
  variables:
    LOG_FILE: "${JOB_NAME}.log"
    CONTAINER_BASE_TYPE: "setme"
    CONTAINER_BUILD_TYPE: "setme"
    CONTAINER_IMAGE_BASE  : "${CONTAINER_IMAGE}-${CONTAINER_BASE_TYPE}-latest"
    CONTAINER_IMAGE_SHA: "${CONTAINER_IMAGE}-${CONTAINER_BUILD_TYPE}-${SHA}"
    CONTAINER_IMAGE_LATEST: "${CONTAINER_IMAGE}-${CONTAINER_BUILD_TYPE}-latest"
  artifacts:
    when: always
    paths:
      - "*.log"

###################################################
## Creating the docker images
###################################################
## https://docs.gitlab.com/ee/user/packages/container_registry/build_and_push_images.html
.image_template:
  stage: docker
  #rules:
  #  - changes:
  #    - "Makefile.common"
  #    - "Makefile.env"
  #    - "mk/Makefile.docker"
  #    - "docker/requirements.txt"
  #    - "docker/Dockerfile.${DOCKER_PLATFORM}"
  #    - "docker/entrypoint.${DOCKER_PLATFORM}.sh"
  extends: .job_template
  image:
    name: docker:24.0.5
  services:
    - docker:dind
  variables:
    # Fetch just the docker file
    GIT_STRATEGY: "fetch"
    GIT_SUBMODULE_STRATEGY: "none"
  before_script:
    - echo "[CI] Checking docker version"
    - docker version
    - echo "[CI] Logging into docker registry"
    - echo "${REGISTRY_PASSWORD}" | docker login ${REGISTRY} -u ${REGISTRY_USER} --password-stdin
    - echo "[CI] Checking for latest docker image"
    - if docker manifest inspect ${CONTAINER_IMAGE_BASE} > /dev/null 2>&1; then
        echo "[CI] ${CONTAINER_IMAGE_BASE} exists, pulling...";
        docker pull ${CONTAINER_IMAGE_BASE};
      else
        echo "[CI] ${CONTAINER_IMAGE_BASE} does not exist, starting from scratch";
      fi
  after_script:
    - echo "[CI] Updating latest docker tag"
    - docker tag ${CONTAINER_IMAGE_SHA} ${CONTAINER_IMAGE_LATEST}
    - echo "[CI] Publishing docker images"
    - docker push ${CONTAINER_IMAGE_SHA}
    - docker push ${CONTAINER_IMAGE_LATEST}
  tags: # Use shared gitlab runner
    - saas-linux-small-amd64

.build_image_template:
  extends: .image_template
  variables:
    CONTAINER_BASE_TYPE: "build"
    CONTAINER_BUILD_TYPE: "build"
  script:
    - echo "[CI] Building base docker image (with prereqs)"
    - docker build docker -f docker/Dockerfile.${DOCKER_PLATFORM}
      --build-arg USER_NAME="${USER_NAME}"
      --build-arg USER_ID="${USER_ID}"
      --build-arg GROUP_NAME="${GROUP_NAME}"
      --build-arg GROUP_ID="${GROUP_ID}"
      --build-arg OTHER_GROUPS="${OTHER_GROUPS}"
      -t ${CONTAINER_IMAGE_SHA} > ${LOG_FILE} 2>&1

.centos7_template:
  variables:
    DOCKER_PLATFORM : "centos7"

.ubuntu2404_template:
  variables:
    DOCKER_PLATFORM : "ubuntu24.04"

build-image-ubuntu2404:
  extends:
    - .build_image_template
    - .ubuntu2404_template

build-image-centos7:
  extends:
    - .build_image_template
    - .centos7_template

.repo_image_template:
  extends: .image_template
  variables:
    # Clone the repo now
    GIT_STRATEGY: "clone"
    GIT_SUBMODULE_STRATEGY: "recursive"
    CONTAINER_BASE_TYPE: "build"
    CONTAINER_BUILD_TYPE: "repo"
  script:
    - echo "[CI] Populating docker image with repo"
    - echo "[CI] TODO Actually do this..."
    - docker tag ${CONTAINER_IMAGE_BASE} ${CONTAINER_IMAGE_SHA}

repo-image-centos7:
  extends:
    - .repo_image_template
    - .centos7_template

repo-image-ubuntu2404:
  extends:
    - .repo_image_template
    - .ubuntu2404_template

