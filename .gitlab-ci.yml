
variables:
  # GitLab variables
  GIT_CLONE_PATH: "${CI_BUILDS_DIR}/${CI_PROJECT_NAME}-${CI_COMMIT_SHA}" # Build directory shared for a commit
  GIT_STRATEGY: "none"
  GIT_SUBMODULE_STRATEGY: "none"
  GIT_CHECKOUT: "false"
  GIT_CLEAN_FLAGS: "none"
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fastest"
  CACHE_COMPRESSION_LEVEL: "fastest"
  # Other varibles
  USER_NAME: "${CI_USER_NAME}"
  USER_ID: "${CI_USER_ID}"
  GROUP_NAME: "${CI_GROUP_NAME}"
  GROUP_ID: "${CI_GROUP_ID}"
  BSG_CADENV_DIR: "${CI_BSG_CADENV_DIR}"
  CORES_PER_JOB: "${CI_CORES_PER_JOB}"
  MISC_DIR: "${CI_MISC_DIR}"
  MAX_CORES: "${CI_MAX_CORES}"
  # Automatic GitLab variables
  BRANCH: "${CI_COMMIT_REF_SLUG}"
  SHA: "${CI_COMMIT_SHA}"
  REGISTRY: "${CI_REGISTRY}"
  REGISTRY_USER: "${CI_REGISTRY_USER}"
  REGISTRY_IMAGE: "${CI_REGISTRY_IMAGE}"
  REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  HASH: "${CI_COMMIT_SHA}"
  REPO_URL: "${CI_REPOSITORY_URL}"
  REPO_NAME: "${CI_PROJECT_NAME}"
  JOB_NAME: "${CI_JOB_NAME_SLUG}"
  CACHE_KEY: "${REPO_NAME}-${BRANCH}" # Cache per-branch
  # Globals
  CONTAINER_BUILD_IMAGE: ${REGISTRY_IMAGE}:build-${SHA}

stages:
  - docker
  - repo

###################################################
## Base Job Template
###################################################
.job_template:
  dependencies: []
  needs: []
  artifacts:
    when: always
    paths:
      - ${LOG_FILE}

###################################################
## Creating the docker image
###################################################
## https://docs.gitlab.com/ee/user/packages/container_registry/build_and_push_images.html
build-image:
  stage: docker
  extends: .job_template
  image:
    name: docker:24.0.5
  services:
    - docker:dind
  variables:
    # Docker args
    DOCKER_PLATFORM : "ubuntu24.04"
    # GitLab variables
    GIT_STRATEGY: "fetch"
    GIT_FETCH_EXTRA_FLAGS: "--no-tags"
    GIT_CHECKOUT: "true"
    GIT_CLEAN_FLAGS: "-ffdx"
    LOG_FILE: "${JOB_NAME}.log"
  script:
    - echo "[CI] Checking docker"
    - docker version
    - echo "[CI] Building docker image"
    - docker build docker/ -f docker/Dockerfile.${DOCKER_PLATFORM}
      --build-arg USER_NAME=${USER_NAME}
      --build-arg USER_ID=${USER_ID}
      --build-arg GROUP_NAME=${GROUP_NAME}
      --build-arg GROUP_ID=${GROUP_ID}
      -t ${CONTAINER_BUILD_IMAGE} > ${LOG_FILE} 2>&1;
    - echo "[CI] Logging into docker"
    - echo "${REGISTRY_PASSWORD}" | docker login ${REGISTRY} -u ${REGISTRY_USER} --password-stdin
    - echo "[CI] Publishing docker image"
    - docker push ${CONTAINER_BUILD_IMAGE}

###################################################
## Creating the ${REPO_NAME} repo
###################################################
repo:
  stage: repo
  extends: .job_template
  needs: ["build-image"]
  image:
    name: "${CONTAINER_BUILD_IMAGE}"
    entrypoint: [""]
  variables:
    # GitLab variables
    GIT_STRATEGY: "fetch"
    GIT_FETCH_EXTRA_FLAGS: "--no-tags"
    GIT_CHECKOUT: "true"
    GIT_CLEAN_FLAGS: "-ffdx"
    LOG_FILE: "${JOB_NAME}.log"
  script:
    - echo "[CI] Doing checkout...";
    - make -j ${MAX_CORES} checkout >> ${LOG_FILE} 2>&1;
    - echo "[CI] Applying patches...";
    - make -j ${MAX_CORES} apply_patches >> ${LOG_FILE} 2>&1;

