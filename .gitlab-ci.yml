
variables:
  #########################################
  # Required BSG Variables
  #########################################
  USER_NAME: "${BSG_CI_USER_NAME}"
  USER_ID: "${BSG_CI_USER_ID}"
  GROUP_NAME: "${BSG_CI_GROUP_NAME}"
  GROUP_ID: "${BSG_CI_GROUP_ID}"
  OTHER_GROUPS: "${BSG_CI_OTHER_GROUPS}"
  CORES_PER_JOB: "${BSG_CI_CORES_PER_JOB}"
  MAX_CORES: "${BSG_CI_MAX_CORES}"
  #########################################
  # Optional BSG Variables
  #########################################
  FORCE_REBUILD: "${BSG_CI_FORCE_REBUILD}"
  FORCE_SKIP_REBUILD: "${BSG_CI_FORCE_SKIP_REBUILD}"
  #########################################
  # GitLab Variables
  #########################################
  # Automatic
  BUILDS: "${CI_BUILDS_DIR}"
  BRANCH: "${CI_COMMIT_REF_SLUG}"
  SHA: "${CI_COMMIT_SHA}"
  REGISTRY: "${CI_REGISTRY}"
  REGISTRY_USER: "${CI_REGISTRY_USER}"
  REGISTRY_IMAGE: "${CI_REGISTRY_IMAGE}"
  REGISTRY_PASSWORD: "${CI_REGISTRY_PASSWORD}"
  HASH: "${CI_COMMIT_SHA}"
  REPO_URL: "${CI_REPOSITORY_URL}"
  REPO_NAME: "${CI_PROJECT_NAME}"
  JOB_NAME: "${CI_JOB_NAME_SLUG}"
  # workaround for https://gitlab.com/gitlab-org/gitlab/-/issues/386967
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: "safe.directory"
  GIT_CONFIG_VALUE_0: "*"
  # Performance flags https://docs.gitlab.com/runner/configuration/feature-flags/
  FF_USE_FASTZIP: "true"
  ARTIFACT_COMPRESSION_LEVEL: "fastest"
  CACHE_COMPRESSION_LEVEL: "fastest"
  #########################################
  # Generated Global Variables
  #########################################
  CACHE_KEY: "${REPO_NAME}-${BRANCH}" # Cache per-branch
  CLONE_PATH: "${REPO_NAME}-${SHA}" # Clone per-commit

###################################################
## Basic Setup
###################################################
env-setup:
  stage: .pre
  image: { name: alpine/git:v2.47.2, entrypoint: [""] }
  script:
    - echo "PREVIOUS_SHA=$(git rev parse HEAD^)" | tee -a $GITLAB_ENV >> build.env
    - echo "CURRENT_SHA=$(git rev parse HEAD)" | tee -a $GITLAB_ENV >> build.env
  artifacts:
    reports:
      dotenv: build.env

###################################################
## Job Templates
###################################################
.centos7_mixin:
  variables: { DOCKER_PLATFORM : "centos7" }

.ubuntu2404_build_mixin:
  variables: { DOCKER_PLATFORM: "ubuntu24.04" }

.no_clone_mixin:
  variables:
    # Don't fetch anything
    GIT_STRATEGY: "none"
    GIT_SUBMODULE_STRATEGY: "none"

.fetch_mixin:
  variables:
    # Fetch just the docker file
    GIT_STRATEGY: "fetch"
    GIT_FETCH_EXTRA_FLAGS: "--prune --progress --no-tags"
    GIT_SUBMODULE_STRATEGY: "none"

.full_clone_mixin:
  variables:
    # Do a full clone
    GIT_STRATEGY: "clone"
    GIT_FETCH_EXTRA_FLAGS: "--prune --progress --no-tags"
    GIT_SUBMODULE_STRATEGY: "recursive"
    GIT_SUBMODULE_UPDATE_FLAGS: "--jobs ${MAX_CORES} --recommend-shallow"

.dind_mixin:
  services: [ docker:dind ]
  tags: [ saas-linux-small-amd64 ] # Use shared gitlab runner

.job_template:
  needs: [ env-setup ]
  extends: .no_clone_mixin
  variables:
    LOG_FILE: "${JOB_NAME}.log"
  artifacts:
    when: always
    paths:
      - "*.log"

## https://docs.gitlab.com/ee/user/packages/container_registry/build_and_push_images.html
.image_template:
  extends: [ .job_template, .fetch_mixin ]
  variables:
    CONTAINER_ROOT: "${REGISTRY_IMAGE}:${DOCKER_PLATFORM}"
    CONTAINER_IMAGE_RAW: "${CONTAINER_ROOT}-${CURRENT_SHA}-raw"
    CONTAINER_IMAGE_REPO: "${CONTAINER_ROOT}-${CURRENT_SHA}-repo"
    PREVIOUS_IMAGE_RAW: "${CONTAINER_ROOT}-${PREVIOUS_SHA}-raw"
    PREVIOUS_IMAGE_REPO: "${CONTAINER_ROOT}-${PREVIOUS_SHA}-repo"
  before_script:
    - echo "[CI] Logging into docker registry"
    - echo "${REGISTRY_PASSWORD}" | docker login ${REGISTRY} -u ${REGISTRY_USER} --password-stdin
    - echo "[CI] Checking for previous docker image ${BASE_IMAGE}"
    - |
      if docker manifest inspect ${BASE_IMAGE} > /dev/null 2>&1; then
        echo "[CI] ${BASE_IMAGE} exists, pulling...";
        docker pull ${BASE_IMAGE};
      else
        echo "[CI] ${BASE_IMAGE} does not exist, starting from scratch";
      fi
  after_script:
    - echo "[CI] Logging into docker registry"
    - echo "${REGISTRY_PASSWORD}" | docker login ${REGISTRY} -u ${REGISTRY_USER} --password-stdin
    - echo "[CI] Publishing docker images"
    - docker push ${CONTAINER_IMAGE}
  rules:
    - if: $FORCE_REBUILD
      when: always
    - if: $FORCE_SKIP_REBUILD
      when: never
    - changes:
        paths:
          - "docker/requirements.txt"
          - "docker/Dockerfile.${DOCKER_PLATFORM}"
          - "docker/entrypoint.${DOCKER_PLATFORM}.sh"

.raw_image_template:
  extends: [ .image_template, .dind_mixin, .fetch_mixin ]
  variables:
    BASE_IMAGE: "${PREVIOUS_IMAGE_RAW}"
    CONTAINER_IMAGE: "${CONTAINER_IMAGE_RAW}"
  script:
    - echo "[CI] Building image ${CURRENT_IMAGE}"
    - |
      docker build docker -f docker/Dockerfile.${DOCKER_PLATFORM}
      --build-arg BUILDKIT_INLINE_CACHE=1 --cache-from ${BASE_IMAGE}
      --build-arg USER_NAME="${USER_NAME}"
      --build-arg USER_ID="${USER_ID}"
      --build-arg GROUP_NAME="${GROUP_NAME}"
      --build-arg GROUP_ID="${GROUP_ID}"
      --build-arg OTHER_GROUPS="${OTHER_GROUPS}"
      -t ${CURRENT_IMAGE} > ${LOG_FILE} 2>&1

.repo_image_template:
  extends: [ .image_template, .dind_mixin, .no_clone_mixin ]
  variables:
    BASE_IMAGE: "${CONTAINER_IMAGE_RAW}"
    CONTAINER_IMAGE: "${CONTAINER_IMAGE_REPO}"
    DOCKER_ENTRYPOINT: "/usr/bin/entrypoint.sh"
    DOCKER_NAME: "run-container"
    DOCKER_LAUNCH: "docker run -d --name ${DOCKER_NAME} ${BASE_IMAGE} /bin/bash"
    DOCKER_EXEC: "docker exec ${DOCKER_NAME} ${DOCKER_ENTRYPOINT} /bin/bash"
  script:
    - echo "[CI] Starting background container"
    - ${DOCKER_LAUNCH} -c "tail -f /dev/null"
    - echo "[CI] Checking logs"
    - docker logs ${DOCKER_NAME}
    - echo "[CI] Cloning repo"
    - ${DOCKER_EXEC} -c "git clone --progress ${REPO_URL} ${CLONE_PATH}"
    - echo "[CI] Sanity checks"
    - ${DOCKER_EXEC} -c "pwd && ls && ls * && echo ${CLONE_PATH}"
    - echo "[CI] Versions"
    - ${DOCKER_EXEC} -c "gcc --version && git --version && python --version && python3 --version"
    - echo "[CI] Checking out ${SHA}"
    - ${DOCKER_EXEC} -c "cd ${CLONE_PATH} && git checkout ${SHA}"
    - echo "[CI] Checking out submodules"
    - ${DOCKER_EXEC} -c "make -j${MAX_CORES} -C ${CLONE_PATH} checkout"
    - echo "[CI] Applying patches to submodules"
    - ${DOCKER_EXEC} -c "make -j${MAX_CORES} -C ${CLONE_PATH} apply_patches"
    - echo "[CI] Committing changes to container"
    - docker commit ${DOCKER_NAME} ${CONTAINER_IMAGE}
    - echo "[CI] Shutting down container"
    - docker stop ${DOCKER_NAME}
    - echo "[CI] Deleting container"
    - docker rm ${DOCKER_NAME}

.build_image_template:
  extends: [ .image_template, .no_clone_mixin ]
  image: { name: "${CONTAINER_IMAGE_REPO}" }
  script:
      - make -j${CORES_PER_JOB} -C ${CLONE_PATH} build.boost
  artifacts:
    when: on_success
    paths:
      - ${CLONE_PATH}/install

###################################################
## Creating and populating the docker images
###################################################
raw-image-ubuntu2404:
  extends: [.build_image_template, .ubuntu2404_build_mixin]
  rules: !reference [.image_template, rules]

raw-image-centos7:
  extends: [.build_image_template, .centos7_mixin]
  rules: !reference [.image_template, rules]

repo-image-ubuntu2404:
  extends: [.repo_image_template, .ubuntu2404_build_mixin]
  needs: [ {job: raw-image-ubuntu2404, optional: true} ]

repo-image-centos7:
  extends: [.repo_image_template, .centos7_mixin]
  needs: [ {job: raw-image-centos7, optional: true} ]

